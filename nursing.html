<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEXCARE — التمريض</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Tajawal', sans-serif; background: #F0F4F8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  .header { width: 100%; max-width: 460px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .header-logo { font-size: 12px; font-weight: 700; color: #888; letter-spacing: 0.1em; }
  .header-title { font-size: 18px; font-weight: 900; color: #0C447C; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #1D9E75; display: inline-block; margin-left: 6px; animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-label { font-size: 12px; color: #1D9E75; font-weight: 700; }
  .waiting-card { background: #fff; border-radius: 20px; border: 2px dashed #ddd; padding: 48px 32px; width: 100%; max-width: 460px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .waiting-icon { width: 56px; height: 56px; border-radius: 50%; background: #F0F4F8; display: flex; align-items: center; justify-content: center; }
  .waiting-icon svg { width: 28px; height: 28px; fill: #bbb; }
  .waiting-text { font-size: 16px; color: #aaa; font-weight: 500; }
  .alert-card { background: #fff; border-radius: 20px; border: 3px solid #1D9E75; width: 100%; max-width: 460px; overflow: hidden; display: none; animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1); }
  .alert-card.visible { display: block; }
  @keyframes popIn { 0%{transform:scale(0.8) translateY(20px);opacity:0} 100%{transform:scale(1) translateY(0);opacity:1} }
  .alert-top { background: #1D9E75; padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
  .alert-bell { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; animation: shake 0.6s ease-in-out 0.2s; }
  @keyframes shake { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-15deg)} 40%{transform:rotate(15deg)} 60%{transform:rotate(-10deg)} 80%{transform:rotate(10deg)} }
  .alert-bell svg { width: 26px; height: 26px; fill: #fff; }
  .alert-badge { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 500; margin-bottom: 2px; }
  .alert-headline { font-size: 19px; font-weight: 900; color: #fff; }
  .alert-body { padding: 24px; text-align: center; }
  .file-label { font-size: 13px; color: #888; font-weight: 500; margin-bottom: 6px; }
  .file-number { font-size: 52px; font-weight: 900; color: #0C447C; letter-spacing: 0.04em; line-height: 1; margin-bottom: 8px; }
  .alert-time { font-size: 13px; color: #aaa; margin-bottom: 24px; }
  .dismiss-btn { width: 100%; padding: 16px; background: #0C447C; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; font-family: 'Tajawal', sans-serif; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .dismiss-btn:hover { background: #185FA5; }
  .dismiss-btn:active { transform: scale(0.98); }
  .pulse-wrap { position: relative; width: 56px; height: 56px; display: none; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .pulse-wrap.active { display: flex; }
  .pulse-ring { position: absolute; width: 56px; height: 56px; border-radius: 50%; border: 3px solid #1D9E75; animation: pulseOut 1.4s ease-out infinite; opacity: 0; }
  .pulse-ring:nth-child(2) { animation-delay: 0.5s; }
  @keyframes pulseOut { 0%{transform:scale(0.9);opacity:0.8} 100%{transform:scale(2.2);opacity:0} }
  .pulse-center { width: 56px; height: 56px; border-radius: 50%; background: #1D9E75; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
  .pulse-center svg { width: 28px; height: 28px; fill: #fff; }
  .history-section { width: 100%; max-width: 460px; margin-top: 20px; }
  .history-title { font-size: 12px; font-weight: 700; color: #aaa; letter-spacing: 0.08em; margin-bottom: 10px; }
  .history-item { background: #fff; border-radius: 12px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .h-file { font-weight: 900; color: #0C447C; font-size: 16px; }
  .h-time { color: #aaa; font-size: 12px; }
  .h-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
  .h-badge.done { background: #E1F5EE; color: #085041; }
  .h-badge.pending { background: #FFF8E6; color: #633806; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">APEXCARE</div>
    <div class="header-title">شاشة التمريض</div>
  </div>
  <div style="text-align:left">
    <span class="status-dot"></span>
    <span class="status-label">متصل</span>
  </div>
</div>

<div class="pulse-wrap" id="pulseWrap">
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-center">
    <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
  </div>
</div>

<div class="waiting-card" id="waitingCard">
  <div class="waiting-icon">
    <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
  </div>
  <div class="waiting-text">في انتظار إشعار من الاستقبال</div>
</div>

<div class="alert-card" id="alertCard">
  <div class="alert-top">
    <div class="alert-bell">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    </div>
    <div>
      <div class="alert-badge">زيارة أولى — يحتاج استقبال التمريض</div>
      <div class="alert-headline">مريض جديد وصل للعيادة</div>
    </div>
  </div>
  <div class="alert-body">
    <div class="file-label">رقم الملف</div>
    <div class="file-number" id="alertFileNum">—</div>
    <div class="alert-time" id="alertTime"></div>
    <button class="dismiss-btn" onclick="dismissAlert()">تم الاستلام ✓</button>
  </div>
</div>

<div class="history-section">
  <div class="history-title">سجل الإشعارات</div>
  <div id="historyList"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onChildAdded, update, query, orderByChild, limitToLast, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const SECRET = "APEXCARE-2026-NOTIFY";

  const app = initializeApp({
    apiKey: "AIzaSyAaSYXo1GkTky85f-o4uWa6kIEXeIMTRKU",
    authDomain: "apexcare-notify.firebaseapp.com",
    databaseURL: "https://apexcare-notify-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "apexcare-notify",
    storageBucket: "apexcare-notify.firebasestorage.app",
    messagingSenderId: "813273136468",
    appId: "1:813273136448:web:a11adc6ef51efcb0749cc1"
  });
  const db = getDatabase(app);

  const waitingCard = document.getElementById('waitingCard');
  const alertCard = document.getElementById('alertCard');
  const alertFileNum = document.getElementById('alertFileNum');
  const alertTime = document.getElementById('alertTime');
  const pulseWrap = document.getElementById('pulseWrap');
  const historyList = document.getElementById('historyList');

  let currentKey = null;
  let historyItems = [];
  let isFirstLoad = true;

  const beep = () => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [[880,0,0.15],[1100,0.2,0.15],[1320,0.4,0.3]].forEach(([f,s,d]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f; o.type = 'sine';
        g.gain.setValueAtTime(0, ctx.currentTime+s);
        g.gain.linearRampToValueAtTime(0.45, ctx.currentTime+s+0.05);
        g.gain.linearRampToValueAtTime(0, ctx.currentTime+s+d);
        o.start(ctx.currentTime+s); o.stop(ctx.currentTime+s+d+0.1);
      });
    } catch(e){}
  };

  const q = query(ref(db, 'notifications'), orderByChild('timestamp'), limitToLast(20));

  onChildAdded(q, (snapshot) => {
    const data = snapshot.val();
    if (data.secret !== SECRET) return;
    const key = snapshot.key;
    if (isFirstLoad) {
      addToHistory(data, key, false);
    } else {
      if (data.status === 'pending') showAlert(data, key);
      addToHistory(data, key, data.status === 'pending');
    }
  });

  setTimeout(() => { isFirstLoad = false; }, 2000);

  function showAlert(data, key) {
    currentKey = key;
    alertFileNum.textContent = data.fileNumber;
    alertTime.textContent = 'وصل الساعة ' + data.time;
    waitingCard.style.display = 'none';
    pulseWrap.classList.add('active');
    alertCard.classList.add('visible');
    beep();
    if ('vibrate' in navigator) navigator.vibrate([300,100,300,100,500]);
  }

  window.dismissAlert = function() {
    if (currentKey) update(ref(db, 'notifications/' + currentKey), { status: 'done' });
    alertCard.classList.remove('visible');
    pulseWrap.classList.remove('active');
    waitingCard.style.display = '';
    currentKey = null;
    renderHistory();
  };

  function addToHistory(data, key, isPending) {
    historyItems = historyItems.filter(h => h.key !== key);
    historyItems.unshift({ key, file: data.fileNumber, time: data.time, pending: isPending });
    if (historyItems.length > 8) historyItems.pop();
    renderHistory();
  }

  function renderHistory() {
    historyList.innerHTML = historyItems.map(h =>
      `<div class="history-item">
        <span class="h-file">${h.file}</span>
        <span class="h-time">${h.time}</span>
        <span class="h-badge ${h.pending ? 'pending' : 'done'}">${h.pending ? 'قيد الانتظار' : 'تم الاستلام'}</span>
      </div>`
    ).join('');
  }
</script>
</body>
</html>
